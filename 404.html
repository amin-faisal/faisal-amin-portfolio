<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Faisal Amin® — Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback: stash the deep link, bounce to the app root.
      sessionStorage.setItem('spa-redirect', location.pathname + location.search + location.hash);
      var parts = location.pathname.split('/');
      var base = parts.length > 1 && parts[1] ? '/' + parts[1] + '/' : '/';
      location.replace(base);
    </script>
  </head>
  <body></body>
</html>
