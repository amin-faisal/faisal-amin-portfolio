    <!--
      Inter, narrowed to the weights actually used (400-700, no italics) and
      loaded off the critical path: media="print" stops it blocking the first
      paint, then onload promotes it. Text paints immediately in the system
      fallback and swaps when Inter lands.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap"
      media="print"
      onload="this.media='all'"
    />

        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap"
      />
    </noscript>
    <script>
      // GitHub Pages SPA redirect: 404.html stashes the deep link, we restore it.
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
